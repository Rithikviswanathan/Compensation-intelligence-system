
<!DOCTYPE html>
<html>
<head>
    <title>Compensation Intelligence System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Compensation Intelligence System</h1>

<div class="summary">
    <h3>Total Salary: ₹{{ total_salary }}</h3>
    <h3>Total Bonus: ₹{{ total_bonus }}</h3>
</div>

<h2>Add Employee</h2>

<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Employee Name" required>
    <input type="text" name="department" placeholder="Department" required>
    <input type="number" name="salary" placeholder="Salary" required>
    <input type="number" name="bonus" placeholder="Bonus" required>
    <button type="submit">Add Employee</button>
</form>

<h2>Employee Compensation Details</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Department</th>
        <th>Salary</th>
        <th>Bonus</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp.name }}</td>
        <td>{{ emp.department }}</td>
        <td>₹{{ emp.salary }}</td>
        <td>₹{{ emp.bonus }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
